name: chirp
description: "Cross-platform digital wellness app with smart break reminders"
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # System tray
  system_tray: ^2.0.3

  # Window management
  window_manager: ^0.5.1

  # Screen detection for overlay
  screen_retriever: ^0.2.0

  # Auto-start on boot
  launch_at_startup: ^0.5.1

  # Local storage
  shared_preferences: ^2.3.0

  # Desktop notifications
  local_notifier: ^0.1.6

  # Mobile notifications
  flutter_local_notifications: ^18.0.0

  # Network for pairing
  network_info_plus: ^6.0.0

  # Typography
  google_fonts: ^6.2.1

  # State management
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.3
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#FAF7F5"
  image: assets/branding/chirp_splash_480.png
  color_dark: "#2A1F3D"
  image_dark: assets/branding/chirp_splash_480_dark.png
  android_12:
    color: "#FAF7F5"
    icon_background_color: "#FAF7F5"
    image: assets/branding/chirp_splash_240.png
    color_dark: "#2A1F3D"
    icon_background_color_dark: "#2A1F3D"
    image_dark: assets/branding/chirp_splash_240_dark.png
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/branding/
