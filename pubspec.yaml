name: blink
description: "Cross-platform digital wellness app with smart break reminders"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # System tray
  system_tray: ^2.0.3

  # Window management
  window_manager: ^0.5.1

  # Auto-start on boot
  launch_at_startup: ^0.5.1

  # Local storage
  shared_preferences: ^2.3.0

  # State management
  flutter_riverpod: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
