<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <!-- Splash screen motif: violet layered C on transparent (light mode) -->

  <!-- Layer 3 (back, lightest, most offset) -->
  <path d="M 329 188 A 130 130 0 1 0 329 292"
        stroke="#E0D4FF" stroke-width="55" stroke-linecap="round" fill="none"
        transform="translate(7, 7)"/>

  <!-- Layer 2 (middle) -->
  <path d="M 329 188 A 130 130 0 1 0 329 292"
        stroke="#B794F6" stroke-width="55" stroke-linecap="round" fill="none"
        transform="translate(3.5, 3.5)"/>

  <!-- Layer 1 (front, darkest) -->
  <path d="M 329 188 A 130 130 0 1 0 329 292"
        stroke="#7C3AED" stroke-width="55" stroke-linecap="round" fill="none"/>
</svg>
